<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ozon Runner: Хлебная мания</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            background-image: url('1773522089236.png'); /* Твой фон Ozon */
            background-size: cover;
            background-position: center;
            font-family: sans-serif;
            touch-action: none; /* Отключает стандартные жесты браузера, чтобы не мешали играть */
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 15px;
            pointer-events: none;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            border: 3px solid #f91155;
            z-index: 20;
        }

        button {
            background: #f91155;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="ui">
    Очки: <span id="score">0</span> | ❤️: <span id="lives">4</span> | 🏆: <span id="highscore">0</span>
</div>

<div id="game-over">
    <h1>ИГРА ОКОНЧЕНА</h1>
    <p>Твой результат: <span id="final-score">0</span></p>
    <p id="new-record-msg" style="color: #FFD700; display: none; font-weight: bold;">НОВЫЙ РЕКОРД!</p>
    <button onclick="location.reload()">ИГРАТЬ СНОВА</button>
</div>

<audio id="bgMusic" loop>
    <source src="Mayhem — Night Music (8-bit) (www.lightaudio.ru).mp3" type="audio/mpeg">
</audio>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const bgMusic = document.getElementById("bgMusic");

// Адаптация ширины под мобилки
canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth;
canvas.height = window.innerHeight;

const sprites = {
    player: new Image(),
    bread: new Image(),
    enemy: new Image(),
    cigs: new Image()
};

// Твои файлы
sprites.player.src = 'InShot_20260315_002246223.png';
sprites.bread.src = 'InShot_20260315_002235078.png';
sprites.enemy.src = 'InShot_20260315_002113104.png';
sprites.cigs.src = 'InShot_20260315_002223501.png';

let score = 0;
let lives = 4;
let isGameOver = false;
let items = [];
let musicStarted = false;
let highscore = localStorage.getItem('ozonRunnerHighscore') || 0;

const player = {
    x: canvas.width / 2 - 50,
    y: canvas.height - 160,
    w: 100,
    h: 140,
    speed: 10,
    dx: 0
};

document.getElementById('highscore').innerText = highscore;

// Функция старта музыки
function startMusic() {
    if (!musicStarted) {
        bgMusic.play().catch(e => console.log("Music wait for interaction"));
        musicStarted = true;
    }
}

// УПРАВЛЕНИЕ КЛАВИАТУРОЙ
window.addEventListener('keydown', (e) => {
    startMusic();
    if (e.key === 'ArrowLeft') player.dx = -player.speed;
    if (e.key === 'ArrowRight') player.dx = player.speed;
});
window.addEventListener('keyup', () => player.dx = 0);

// СЕНСОРНОЕ УПРАВЛЕНИЕ
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startMusic(); // Запуск музыки при касании
    const touchX = e.touches[0].clientX;
    const screenMid = window.innerWidth / 2;
    
    if (touchX < screenMid) player.dx = -player.speed;
    else player.dx = player.speed;
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    player.dx = 0;
}, {passive: false});

function spawnItem() {
    if (isGameOver) return;
    const rand = Math.random();
    let type = 'bread';
    if (rand > 0.65 && rand <= 0.93) type = 'enemy';
    else if (rand > 0.93) type = 'cigs';

    items.push({
        x: Math.random() * (canvas.width - 60),
        y: -100,
        w: 60,
        h: 60,
        type: type,
        speed: 4 + Math.random() * 4
    });

    let spawnRate = Math.max(300, 900 - (score / 3));
    setTimeout(spawnItem, spawnRate);
}

function update() {
    if (isGameOver) return;
    player.x += player.dx;
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.speed;

        if (item.x < player.x + player.w - 15 && item.x + item.w > player.x + 15 &&
            item.y < player.y + player.h - 15 && item.y + item.h > player.y + 15) {
            
            if (item.type === 'bread') score += 10;
            else if (item.type === 'enemy') lives--;
            else if (item.type === 'cigs' && lives < 4) lives++;
            
            updateUI();
            items.splice(i, 1);
            if (lives <= 0) gameOver();
            continue;
        }
        if (item.y > canvas.height) items.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(sprites.player, player.x, player.y, player.w, player.h);
    items.forEach(item => {
        let img = sprites.bread;
        if (item.type === 'enemy') img = sprites.enemy;
        if (item.type === 'cigs') img = sprites.cigs;
        ctx.drawImage(img, item.x, item.y, item.w, item.h);
    });
    if (!isGameOver) requestAnimationFrame(() => { update(); draw(); });
}

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('lives').innerText = lives;
    document.getElementById('highscore').innerText = highscore;
}

function gameOver() {
    isGameOver = true;
    bgMusic.pause();
    if (score > highscore) {
        highscore = score;
        localStorage.setItem('ozonRunnerHighscore', highscore);
        document.getElementById('new-record-msg').style.display = 'block';
    }
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('final-score').innerText = score;
}

// Старт после загрузки всех ресурсов
window.onload = () => {
    spawnItem();
    draw();
};

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth;
    canvas.height = window.innerHeight;
    player.y = canvas.height - 160;
});
</script>
</body>
</html>
